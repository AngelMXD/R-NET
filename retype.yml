# Configuración R-NET - Reino Estelar 2026
input: .
output: site

# URL REAL (Esto arregla el error de CNAME y activa el PWA)
url: https://reinoestelar.com


branding:
  title: "R-NET"
  logo: logo-reino-estelar.webp
  label: "v5.0"
  favicon: favicon.ico

footer:
  copyright: "© R-NET · Intranet Estelar · v5.0 · 2026" 
  branding: false  

search:
  enabled: true
  placeholder: "Buscar en la intranet..."

locale: es

sitemap:
  enabled: true

editor:
  enabled: true
  repo: https://github.com/AngelMXD/R-NET/blob/main/{{ path }}
  text: "Sugerir un cambio en GitHub"

theme:
  base:
    base-link-weight: 500
    nav-item-text-active-weight: 800
    heading-text: "#1a202c"
    base-color: "#8839ef"

backlinks:
  enabled: true
  label: "Se menciona en estas guías:"


meta:
  - name: apple-mobile-web-app-title
    content: R-NET
  - name: application-name
    content: R-NET
  - link:
      rel: apple-touch-icon
      sizes: 180x180
      href: apple-touch-icon.png
  - link:
      rel: manifest
      href: manifest.json