# Configuración R-NET - Reino Estelar 2026
input: .
output: ./site

# URL de tu sitio (IMPORTANTE PARA SEO Y FUNCIONES PRO)
url: https://AngelMXD.github.io/R-NET/

password: "test1234" # Cambia esto por una contraseña segura para proteger tu intranet

branding:
  title: "R-NET"
  logo: logo-reino-estelar.webp
  label: "v5.0"
  favicon: favicon.ico


footer:
  copyright: "© R-NET · Intranet Estelar · v5.0 · Última actualización: Marzo 2026" 
  branding: false  

# Texto personalizado para la opcion de búsqueda
search:
  enabled: true
  placeholder: "Buscar en la intranet..."

locale: es

hosting:
  # Dominio oficial
  cname: reinoestelar.com

sitemap:
  enabled: true



editor:
  enabled: true
  repo: https://github.com/AngelMXD/R-NET/blob/main/{{ path }}
  text: "Sugerir un cambio en GitHub"



theme:
  base:
    base-link-weight: 500            # Slightly bolder links
    nav-item-text-active-weight: 800 # Bold active navigation
    heading-text: "#1a202c"          # Darker headings
    base-color: "#8839ef"

backlinks:
  enabled: true
  label: "Se menciona en estas guías:" # Texto de suguerenciaal para la sección de backlinks





  meta:
  - name: apple-mobile-web-app-title
    content: R-NET
  - name: application-name
    content: R-NET
  - link:
      rel: apple-touch-icon
      sizes: 180x180
      href: apple-touch-icon.png
  - link:
      rel: manifest
      href: manifest.json