##Para generar el changelog, 
##se utiliza un script que toma la información de este archivo y 
##la convierte en un formato legible. 
##El script está diseñado para facilitar la actualización del changelog y 
##asegurar que todos los cambios sean documentados de manera clara y concisa.

#Este es el comando que se utiliza para generar el changelog y Genera el sitio web:
# npm run changelog && retype build
## Es mega importante que se haga el "netlify deploy --prod" 
##para que se suba el sitio web a la nube.


